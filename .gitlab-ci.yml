  - if: $CI_COMMIT_BRANCH == "develop"
test:coverage:
  image: rust:1.92.0-alpine
  before_script:
  - rustup component add rustfmt clippy
  - apt-get update && apt-get install -y cmake pkg-config libssl-dev libpq-dev
  cache:
    key:
      files:
      - Cargo.lock
    paths:
    - ".cargo/bin/"
    - ".cargo/registry/index/"
    - ".cargo/registry/cache/"
    - ".cargo/git/db/"
    - target/
    policy: pull-push
  stage: test
  needs:
  - build:linux
  script:
  - apt-get install -y softhsm2
  - mkdir -p ~/.config/softhsm2 ~/.softhsm2/tokens
  - echo "directories.tokendir = $HOME/.softhsm2/tokens" > ~/.config/softhsm2/softhsm2.conf
  - softhsm2-util --init-token --slot 0 --label "ostrich-test" --pin 1234 --so-pin
    5678
  - cargo install cargo-tarpaulin
  - cargo tarpaulin --workspace --all-features --timeout 300 --out Xml --output-dir
    ./coverage
  variables:
    PKCS11_MODULE_PATH: "/usr/lib/softhsm/libsofthsm2.so"
    CRYPTO_PROVIDER: software
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura.xml
  coverage: "/^\\d+.\\d+% coverage/"
  rules:
  - if: $CI_COMMIT_BRANCH == "main"
  - if: $CI_COMMIT_BRANCH == "develop"
test:integration:
  image: rust:1.92.0-alpine
  before_script:
  - rustup component add rustfmt clippy
  - apt-get update && apt-get install -y cmake pkg-config libssl-dev libpq-dev
  cache:
    key:
      files:
      - Cargo.lock
    paths:
    - ".cargo/bin/"
    - ".cargo/registry/index/"
    - ".cargo/registry/cache/"
    - ".cargo/git/db/"
    - target/
    policy: pull-push
  stage: integration
  needs:
  - test:unit
  services:
  - name: postgres:16-alpine
    alias: postgres
  script:
  - apt-get install -y softhsm2
  - mkdir -p ~/.config/softhsm2 ~/.softhsm2/tokens
  - echo "directories.tokendir = $HOME/.softhsm2/tokens" > ~/.config/softhsm2/softhsm2.conf
  - softhsm2-util --init-token --slot 0 --label "ostrich-test" --pin 1234 --so-pin
    5678
  - apt-get install -y postgresql-client
  - until pg_isready -h postgres -p 5432; do sleep 2; done
  - cargo install sqlx-cli --no-default-features --features postgres
  - sqlx database create || true
  - sqlx migrate run
  - cargo test --test '*' -- --test-threads=1
  variables:
    PKCS11_MODULE_PATH: "/usr/lib/softhsm/libsofthsm2.so"
    PKCS11_SLOT_ID: '0'
    PKCS11_PIN: '1234'
    CRYPTO_PROVIDER: software
    RUST_LOG: info
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_COMMIT_BRANCH == "main"
  - if: $CI_COMMIT_BRANCH == "develop"
