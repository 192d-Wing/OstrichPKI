# You can override the included template(s) by including variable overrides
# SAST customization: https://docs.gitlab.com/ee/user/application_security/sast/#customizing-the-sast-settings
# Secret Detection customization: https://docs.gitlab.com/user/application_security/secret_detection/pipeline/configure
# Dependency Scanning customization: https://docs.gitlab.com/ee/user/application_security/dependency_scanning/#customizing-the-dependency-scanning-settings
# Container Scanning customization: https://docs.gitlab.com/ee/user/application_security/container_scanning/#customizing-the-container-scanning-settings
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ee/ci/variables/#cicd-variable-precedence
variables:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  POSTGRES_USER: ostrich_test
  POSTGRES_PASSWORD: test_password_insecure
  POSTGRES_DB: ostrich_pki_test
  DATABASE_URL: postgresql://ostrich_test:test_password_insecure@postgres:5432/ostrich_pki_test
".cargo-cache":
  cache:
    key:
      files:
      - Cargo.lock
    paths:
    - ".cargo/bin/"
    - ".cargo/registry/index/"
    - ".cargo/registry/cache/"
    - ".cargo/git/db/"
    - target/
    policy: pull-push
".rust-base":
  image: rust:1.92.0-alpine
  before_script:
  - rustup component add rustfmt clippy
  - apt-get update && apt-get install -y cmake pkg-config libssl-dev libpq-dev
stages:
- lint
- security
- build
- test
- integration
- benchmark
- compliance
- sbom
lint:format:
  image: rust:1.92.0-alpine
  before_script:
  - rustup component add rustfmt clippy
  - apt-get update && apt-get install -y cmake pkg-config libssl-dev libpq-dev
  cache:
    key:
      files:
      - Cargo.lock
    paths:
    - ".cargo/bin/"
    - ".cargo/registry/index/"
    - ".cargo/registry/cache/"
    - ".cargo/git/db/"
    - target/
    policy: pull-push
  stage: lint
  script:
  - cargo fmt --all -- --check
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_COMMIT_BRANCH == "main"
  - if: $CI_COMMIT_BRANCH == "develop"
lint:clippy:
  image: rust:1.92.0-alpine
  before_script:
  - rustup component add rustfmt clippy
  - apt-get update && apt-get install -y cmake pkg-config libssl-dev libpq-dev
  cache:
    key:
      files:
      - Cargo.lock
    paths:
    - ".cargo/bin/"
    - ".cargo/registry/index/"
    - ".cargo/registry/cache/"
    - ".cargo/git/db/"
    - target/
    policy: pull-push
  stage: lint
  script:
  - cargo clippy --all-targets --all-features -- -D warnings
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_COMMIT_BRANCH == "main"
  - if: $CI_COMMIT_BRANCH == "develop"
security:audit:
  image: rust:1.92.0-alpine
  before_script:
  - rustup component add rustfmt clippy
  - apt-get update && apt-get install -y cmake pkg-config libssl-dev libpq-dev
  cache:
    key:
      files:
      - Cargo.lock
    paths:
    - ".cargo/bin/"
    - ".cargo/registry/index/"
    - ".cargo/registry/cache/"
    - ".cargo/git/db/"
    - target/
    policy: pull-push
  stage: security
  script:
  - cargo install cargo-audit --locked
  - cargo audit --deny warnings
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_COMMIT_BRANCH == "main"
  - if: $CI_COMMIT_BRANCH == "develop"
  - if: $CI_PIPELINE_SOURCE == "schedule"
  allow_failure: false
security:deny:
  image: rust:1.92.0-alpine
  before_script:
  - rustup component add rustfmt clippy
  - apt-get update && apt-get install -y cmake pkg-config libssl-dev libpq-dev
  cache:
    key:
      files:
      - Cargo.lock
    paths:
    - ".cargo/bin/"
    - ".cargo/registry/index/"
    - ".cargo/registry/cache/"
    - ".cargo/git/db/"
    - target/
    policy: pull-push
  stage: security
  script:
  - cargo install cargo-deny --locked
  - cargo deny check
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_COMMIT_BRANCH == "main"
  - if: $CI_COMMIT_BRANCH == "develop"
security:secrets:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
  - gitleaks detect --source . --verbose
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_COMMIT_BRANCH == "main"
  - if: $CI_COMMIT_BRANCH == "develop"
include:
- template: Security/SAST.gitlab-ci.yml
- template: Security/Dependency-Scanning.gitlab-ci.yml
- template: Security/Secret-Detection.gitlab-ci.yml
build:linux:
  image: rust:1.92.0-alpine
  before_script:
  - rustup component add rustfmt clippy
  - apt-get update && apt-get install -y cmake pkg-config libssl-dev libpq-dev
  cache:
    key:
      files:
      - Cargo.lock
    paths:
    - ".cargo/bin/"
    - ".cargo/registry/index/"
    - ".cargo/registry/cache/"
    - ".cargo/git/db/"
    - target/
    policy: pull-push
  stage: build
  script:
  - apt-get install -y softhsm2
  - mkdir -p ~/.config/softhsm2 ~/.softhsm2/tokens
  - echo "directories.tokendir = $HOME/.softhsm2/tokens" > ~/.config/softhsm2/softhsm2.conf
  - softhsm2-util --init-token --slot 0 --label "ostrich-test" --pin 1234 --so-pin
    5678
  - cargo build --workspace --all-features --verbose
  artifacts:
    paths:
    - target/debug/
    expire_in: 1 hour
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_COMMIT_BRANCH == "main"
  - if: $CI_COMMIT_BRANCH == "develop"
