compliance:docs:
  stage: compliance
  image: alpine:latest
  script:
  - |
    echo "Checking compliance documentation..."
    test -f docs/compliance/NIST_800-53_MAPPING.md || exit 1
    test -f docs/compliance/NIAP_COMPLIANCE.md || exit 1
    test -f docs/compliance/RFC_COMPLIANCE.md || exit 1
    test -f docs/compliance/FIPS_COMPLIANCE.md || exit 1
    test -f docs/compliance/ATO_EVIDENCE.md || exit 1
    echo "✓ All compliance documentation files present"
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_COMMIT_BRANCH == "main"
  - if: $CI_COMMIT_BRANCH == "develop"
compliance:annotations:
  stage: compliance
  image: alpine:latest
  script:
  - apk add --no-cache grep
  - |
    # Count NIST 800-53 annotations
    NIST_COUNT=$(grep -r "NIST 800-53:" crates/ | wc -l)
    echo "Found $NIST_COUNT NIST 800-53 annotations"

    # Count NIAP PP-CA annotations
    NIAP_COUNT=$(grep -r "NIAP PP-CA:" crates/ | wc -l)
    echo "Found $NIAP_COUNT NIAP PP-CA annotations"

    # Require minimum annotations
    if [ $NIST_COUNT -lt 50 ]; then
      echo "⚠️  Warning: Low NIST 800-53 annotation count"
    fi
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_COMMIT_BRANCH == "main"
sbom:generate:
  image: rust:1.92.0-alpine
  before_script:
  - rustup component add rustfmt clippy
  - apt-get update && apt-get install -y cmake pkg-config libssl-dev libpq-dev
  cache:
    key:
      files:
      - Cargo.lock
    paths:
    - ".cargo/bin/"
    - ".cargo/registry/index/"
    - ".cargo/registry/cache/"
    - ".cargo/git/db/"
    - target/
    policy: pull-push
  stage: sbom
  script:
  - cargo install cargo-sbom
  - cargo sbom > sbom.spdx.json
  artifacts:
    paths:
    - sbom.spdx.json
    expire_in: 1 year
  rules:
  - if: $CI_COMMIT_BRANCH == "main"
  - if: "$CI_COMMIT_TAG"
docker:build:
  stage: build
  image: docker:24
  services:
  - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - |
    for service in ca acme est ocsp scms kra; do
      docker build --target ${service}-service -t $CI_REGISTRY_IMAGE/${service}:$CI_COMMIT_SHA .
      docker push $CI_REGISTRY_IMAGE/${service}:$CI_COMMIT_SHA
    done
  - |
    if [ "$CI_COMMIT_BRANCH" == "main" ]; then
      for service in ca acme est ocsp scms kra; do
        docker tag $CI_REGISTRY_IMAGE/${service}:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE/${service}:latest
        docker push $CI_REGISTRY_IMAGE/${service}:latest
      done
    fi
  rules:
  - if: $CI_COMMIT_BRANCH == "main"
  - if: "$CI_COMMIT_TAG"
