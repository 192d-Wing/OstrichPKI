# SoftHSM2 configuration for OstrichPKI development containers
#
# The token store lives on the shared `softhsm_tokens` volume so the one-shot
# ca-init container (which creates the CA key) and ca-service (which uses it)
# see the same token.
#
# COMPLIANCE MAPPING:
# - NIAP PP-CA: FCS_STG_EXT.1 - PKCS#11 key storage (SoftHSM is the dev
#   stand-in; production uses a FIPS 140-3 validated HSM module)
directories.tokendir = /app/tokens
objectstore.backend = file
log.level = INFO
slots.removable = false
