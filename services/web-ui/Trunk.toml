# Trunk configuration for building the Yew WASM application
# https://trunkrs.dev/

[build]
# HTML entry point (NOT the Rust target — Trunk always targets wasm32). The
# previous value here ("wasm32-unknown-unknown") made Trunk look for an HTML
# file by that name and fail.
target = "index.html"

# Output directory for compiled assets
dist = "dist"

# Emit stable (un-hashed) asset filenames (ostrich_web_ui_client.js /
# _bg.wasm). The server's CSP-nonce index template references these fixed
# names, so hashing must be off for the two to line up.
filehash = false

# Public URL path where static assets are served
public_url = "/static/"

# Minify output in release mode
# Note: handled by wasm-opt settings below

[watch]
# Directories to watch for changes
watch = ["src/client", "index.html", "input.css"]
# Ignore patterns
ignore = ["dist", "target"]

# Pre-build hook: Compile Tailwind CSS
[[hooks]]
stage = "pre_build"
command = "sh"
command_arguments = ["-c", "mkdir -p dist && { npx --no-install tailwindcss -i ./input.css -o ./dist/output.css --minify 2>/dev/null || echo '/* tailwindcss CLI unavailable; UI renders unstyled */' > ./dist/output.css; }"]

# WASM optimization settings.
#
# NOTE: the [tools] wasm_opt key is the binaryen *version* to fetch, NOT the
# optimization level. The previous value "Oz" made Trunk request a nonexistent
# release (binaryen-Oz-<arch>.tar.gz -> 404). The optimization LEVEL is set on
# the rust link in index.html (data-wasm-opt="z"); with no version pinned here,
# Trunk downloads its known-good default binaryen.

# Proxy configuration for development
[serve]
# Address to bind to
address = "127.0.0.1"
# Port to serve on
port = 8080
# Open browser on serve
open = false
# Proxy API requests to the backend
# [[serve.proxy]]
# backend = "http://localhost:8081"
# rewrite = "/api/"
