<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="OstrichPKI Administration Interface" />
    <meta name="theme-color" content="#1a365d" />

    <title>OstrichPKI Admin</title>

    <!-- Tailwind CSS (compiled) - nonce injected by server -->
    <link data-trunk rel="css" href="dist/output.css" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔐%3C/text%3E%3C/svg%3E" />

    <style>
        /* Minimal critical CSS for loading state */
        .loading-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f3f4f6;
        }
        .loading-spinner {
            display: inline-block;
            width: 3rem;
            height: 3rem;
            border: 4px solid #2563eb;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 1rem;
            color: #4b5563;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Loading indicator shown while WASM loads -->
    <div id="loading" class="loading-container">
        <div style="text-align: center;">
            <div class="loading-spinner"></div>
            <p class="loading-text">Loading OstrichPKI...</p>
        </div>
    </div>

    <!-- Yew app mounts here -->
    <div id="app"></div>

    <!-- Yew WASM application (Trunk handles this) -->
    <!-- data-target-name selects the cdylib client lib (the package also has a host-only server bin). -->
    <link data-trunk rel="rust" href="Cargo.toml" data-target-name="ostrich_web_ui_client" data-wasm-opt="z" />

    <!-- No-script fallback -->
    <noscript>
        <div class="loading-container">
            <div style="text-align: center; padding: 2rem; background: white; border-radius: 0.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                <h1 style="font-size: 1.25rem; font-weight: bold; color: #111827;">JavaScript Required</h1>
                <p style="margin-top: 0.5rem; color: #4b5563;">
                    OstrichPKI requires JavaScript to be enabled.
                    Please enable JavaScript in your browser settings.
                </p>
            </div>
        </div>
    </noscript>
</body>
</html>
