# Docker Compose for OstrichPKI Integration Testing
#
# COMPLIANCE MAPPING:
# - NIST 800-53: SA-11 (Developer Security Testing)
# - NIST 800-53: CA-2 (Security Assessments)

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ostrich-test-db
    environment:
      POSTGRES_USER: ostrich_test
      POSTGRES_PASSWORD: test_password_insecure
      POSTGRES_DB: ostrich_pki_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ostrich_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  # CA Service
  ca-service:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: ca-service
    container_name: ostrich-test-ca
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://ostrich_test:test_password_insecure@postgres:5432/ostrich_pki_test
      # Bind addresses
      CA_REST_ADDRESS: 0.0.0.0:8080
      CA_GRPC_ADDRESS: 0.0.0.0:50051
      # Test mode
      RUST_LOG: debug
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - ./fixtures/certs:/app/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ACME Service (HTTP)
  acme-service:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: acme-service
    container_name: ostrich-test-acme
    depends_on:
      postgres:
        condition: service_healthy
      ca-service:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://ostrich_test:test_password_insecure@postgres:5432/ostrich_pki_test
      # ACME Configuration
      ACME_BIND_ADDRESS: 0.0.0.0:8080
      ACME_BASE_URL: http://acme-service:8080
      # Test mode
      RUST_LOG: debug
    ports:
      - "8090:8080"
    volumes:
      - ./fixtures/certs:/app/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # EST Service (HTTPS with mTLS)
  est-service:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: est-service
    container_name: ostrich-test-est
    depends_on:
      postgres:
        condition: service_healthy
      ca-service:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://ostrich_test:test_password_insecure@postgres:5432/ostrich_pki_test
      # EST Configuration
      EST_BIND_ADDRESS: 0.0.0.0:8443
      # TLS (optional for testing)
      TLS_CERT_FILE: /app/certs/est-service.pem
      TLS_KEY_FILE: /app/certs/est-service-key.pem
      TLS_CA_CERT_FILE: /app/certs/root-ca.pem
      # Test mode
      RUST_LOG: debug
    ports:
      - "8443:8443"
    volumes:
      - ./fixtures/certs:/app/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8443/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # OCSP Responder (HTTP)
  ocsp-service:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: ocsp-service
    container_name: ostrich-test-ocsp
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://ostrich_test:test_password_insecure@postgres:5432/ostrich_pki_test
      # OCSP Configuration
      OCSP_BIND_ADDRESS: 0.0.0.0:8081
      OCSP_SIGNING_CERT: /app/certs/ocsp-signer.pem
      OCSP_SIGNING_KEY: /app/certs/ocsp-signer-key.pem
      # Test mode
      RUST_LOG: debug
    ports:
      - "8081:8081"
    volumes:
      - ./fixtures/certs:/app/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # SCMS Service
  scms-service:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: scms-service
    container_name: ostrich-test-scms
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://ostrich_test:test_password_insecure@postgres:5432/ostrich_pki_test
      # SCMS Configuration
      SCMS_BIND_ADDRESS: 0.0.0.0:8082
      # Test mode
      RUST_LOG: debug
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # KRA Service
  kra-service:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: kra-service
    container_name: ostrich-test-kra
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://ostrich_test:test_password_insecure@postgres:5432/ostrich_pki_test
      # KRA Configuration
      KRA_BIND_ADDRESS: 0.0.0.0:8083
      # Test mode
      RUST_LOG: debug
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: ostrich-test-network
