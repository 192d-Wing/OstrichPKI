# OstrichPKI Docker Compose - Production Configuration
#
# COMPLIANCE MAPPING:
# - NIST 800-53: CM-2 (Baseline Configuration)
# - NIST 800-53: CM-6 (Configuration Settings)
# - NIST 800-53: SC-8 (Transmission Confidentiality)
#
# Usage:
#   docker-compose up -d                    # Start all services
#   docker-compose up -d ca acme            # Start specific services
#   docker-compose logs -f ca               # View CA logs
#   docker-compose down                     # Stop all services

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ostrich-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ostrich}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ostrich_pki}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ostrich}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ostrich-internal

  # Certificate Authority Service
  ca:
    build:
      context: .
      dockerfile: Dockerfile
      target: ca-service
    container_name: ostrich-ca
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-ostrich}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ostrich_pki}
      # Bind addresses
      CA_REST_ADDRESS: 0.0.0.0:8080
      CA_GRPC_ADDRESS: 0.0.0.0:50051
      # CA Configuration
      CA_CERT_FILE: ${CA_CERT_FILE:-}
      CA_KEY_FILE: ${CA_KEY_FILE:-}
      # Logging
      RUST_LOG: ${RUST_LOG:-info}
      LOG_JSON: ${LOG_JSON:-true}
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - ./certs:/app/certs:ro
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ostrich-internal
      - ostrich-external

  # ACME Protocol Service (RFC 8555)
  acme:
    build:
      context: .
      dockerfile: Dockerfile
      target: acme-service
    container_name: ostrich-acme
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ca:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-ostrich}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ostrich_pki}
      # ACME Configuration
      ACME_BIND_ADDRESS: 0.0.0.0:8080
      ACME_BASE_URL: ${ACME_BASE_URL:-http://localhost:8080}
      # Logging
      RUST_LOG: ${RUST_LOG:-info}
      LOG_JSON: ${LOG_JSON:-true}
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ostrich-internal
      - ostrich-external

  # EST Enrollment Service (RFC 7030)
  est:
    build:
      context: .
      dockerfile: Dockerfile
      target: est-service
    container_name: ostrich-est
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ca:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-ostrich}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ostrich_pki}
      # EST Configuration
      EST_BIND_ADDRESS: 0.0.0.0:8443
      # TLS Configuration
      TLS_CERT_FILE: ${EST_TLS_CERT_FILE:-}
      TLS_KEY_FILE: ${EST_TLS_KEY_FILE:-}
      TLS_CA_CERT_FILE: ${EST_TLS_CA_CERT_FILE:-}
      # Logging
      RUST_LOG: ${RUST_LOG:-info}
      LOG_JSON: ${LOG_JSON:-true}
    ports:
      - "8443:8443"
    volumes:
      - ./certs:/app/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8443/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ostrich-internal
      - ostrich-external

  # OCSP Responder (RFC 6960)
  ocsp:
    build:
      context: .
      dockerfile: Dockerfile
      target: ocsp-service
    container_name: ostrich-ocsp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-ostrich}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ostrich_pki}
      # OCSP Configuration
      OCSP_BIND_ADDRESS: 0.0.0.0:8081
      OCSP_SIGNING_CERT: ${OCSP_SIGNING_CERT:-}
      OCSP_SIGNING_KEY: ${OCSP_SIGNING_KEY:-}
      # Logging
      RUST_LOG: ${RUST_LOG:-info}
      LOG_JSON: ${LOG_JSON:-true}
    ports:
      - "8081:8081"
    volumes:
      - ./certs:/app/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ostrich-internal
      - ostrich-external

  # Smartcard Management System
  scms:
    build:
      context: .
      dockerfile: Dockerfile
      target: scms-service
    container_name: ostrich-scms
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-ostrich}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ostrich_pki}
      # SCMS Configuration
      SCMS_BIND_ADDRESS: 0.0.0.0:8082
      # Logging
      RUST_LOG: ${RUST_LOG:-info}
      LOG_JSON: ${LOG_JSON:-true}
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ostrich-internal

  # Key Recovery Authority
  kra:
    build:
      context: .
      dockerfile: Dockerfile
      target: kra-service
    container_name: ostrich-kra
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-ostrich}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ostrich_pki}
      # KRA Configuration
      KRA_BIND_ADDRESS: 0.0.0.0:8083
      # Logging
      RUST_LOG: ${RUST_LOG:-info}
      LOG_JSON: ${LOG_JSON:-true}
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ostrich-internal

volumes:
  postgres_data:
    driver: local

networks:
  ostrich-internal:
    name: ostrich-internal
    internal: true
  ostrich-external:
    name: ostrich-external
