# Publish container images
#
# Builds the multi-service Dockerfile and publishes each service image to the
# GitHub Container Registry (GHCR):
#   ghcr.io/<owner>/{ca-service,acme-service,est-service,ocsp-service,
#                    scms-service,kra-service,cli}
# The web UI has its own multi-stage Dockerfile (Trunk WASM client + Axum
# server) and is published alongside them as:
#   ghcr.io/<owner>/web-ui
# Tags: the short commit SHA always; plus :latest and :<workspace-version> on
# the default branch, and :<tag> for a pushed git tag.
#
# The service images and the web UI build two independent Rust graphs (each
# recompiles the FIPS crypto module), so they run as two PARALLEL jobs — the
# slower of the two now sets the wall-clock instead of their sum.
#
# Built on a native linux/arm64 runner (the target k3s cluster is arm64). Public
# repos get free `ubuntu-24.04-arm` runners, so this avoids slow QEMU emulation.
#
# COMPLIANCE MAPPING:
# - NIST 800-53: SA-10 (Developer Configuration Management) - reproducible image build
# - NIST 800-53: SI-7 (Software/Firmware Integrity) - images built from source in CI
# - NIST 800-53: CM-2 (Baseline Configuration) - single Dockerfile, pinned bases

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Least privilege: read the repo, write packages (GHCR).
permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Service images (share one cached `builder` stage) ----
  services:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push service images
        shell: bash
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"   # GHCR requires a lowercase path
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          sha="${GITHUB_SHA::7}"

          # The SHA tag is always published; latest/version only from main, and
          # the tag name (minus a leading v) for a tag push.
          extra_tags=()
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            extra_tags+=( "latest" "${version}" )
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            extra_tags+=( "${GITHUB_REF_NAME#v}" )
          fi

          for svc in ca-service acme-service est-service ocsp-service scms-service kra-service cli; do
            tags=( --tag "ghcr.io/${owner}/${svc}:sha-${sha}" )
            for t in "${extra_tags[@]}"; do
              tags+=( --tag "ghcr.io/${owner}/${svc}:${t}" )
            done

            echo "::group::build ${svc} (${tags[*]})"
            # All service targets share the expensive `builder` stage; a single
            # GHA cache scope lets it be built once and reused across services
            # and across runs.
            docker buildx build \
              --target "${svc}" \
              "${tags[@]}" \
              --cache-from "type=gha,scope=ostrich" \
              --cache-to "type=gha,scope=ostrich,mode=max" \
              --push \
              .
            echo "::endgroup::"
          done

          echo "Published service images: ca-service acme-service est-service ocsp-service scms-service kra-service cli"

  # ---- Web UI (independent Dockerfile + build graph) ----
  web-ui:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web-ui image
        shell: bash
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          sha="${GITHUB_SHA::7}"

          extra_tags=()
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            extra_tags+=( "latest" "${version}" )
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            extra_tags+=( "${GITHUB_REF_NAME#v}" )
          fi

          # The web UI builds from its own Dockerfile (services/web-ui/Dockerfile):
          # a Trunk/WASM client stage + an Axum server stage, combined into one
          # runtime image. Build context is the repo root so the Dockerfile can
          # COPY the workspace. Its build graph differs from the root image, so it
          # uses a separate cache scope.
          webui_tags=( --tag "ghcr.io/${owner}/web-ui:sha-${sha}" )
          for t in "${extra_tags[@]}"; do
            webui_tags+=( --tag "ghcr.io/${owner}/web-ui:${t}" )
          done

          echo "::group::build web-ui (${webui_tags[*]})"
          docker buildx build \
            --file services/web-ui/Dockerfile \
            --target runtime \
            "${webui_tags[@]}" \
            --cache-from "type=gha,scope=ostrich-web-ui" \
            --cache-to "type=gha,scope=ostrich-web-ui,mode=max" \
            --push \
            .
          echo "::endgroup::"

          echo "Published image: web-ui"
