# Publish container images
#
# Builds the multi-service Dockerfile and publishes each service image to the
# GitHub Container Registry (GHCR):
#   ghcr.io/<owner>/{ca-service,acme-service,est-service,ocsp-service,
#                    scms-service,kra-service,cli,npe-portal}
# The web UI has its own multi-stage Dockerfile (Trunk WASM client + Axum
# server) and is published alongside them as:
#   ghcr.io/<owner>/web-ui
# Tags: the short commit SHA always; plus :latest and :<workspace-version> on
# the default branch, and :<tag> for a pushed git tag.
#
# The service images and the web UI build two independent Rust graphs (each
# recompiles the FIPS crypto module), so they run as two PARALLEL jobs — the
# slower of the two now sets the wall-clock instead of their sum.
#
# The service images are published as a multi-arch manifest (linux/amd64 +
# linux/arm64). Each platform is built on its OWN NATIVE runner — amd64 on
# ubuntu-24.04, arm64 on ubuntu-24.04-arm — because rustc segfaults under QEMU
# user-mode emulation, so amd64 cannot be cross-built on an arm64 host. The
# per-arch `build-services` matrix pushes each image by digest, and
# `merge-services` combines the two digests into one manifest with `imagetools`.
#
# The runtime base is the DoD Iron Bank hardened UBI 10 image (registry1.dso.mil),
# pulled with the REPO1_USER (username) / REPO1 (password) org secrets.
#
# COMPLIANCE MAPPING:
# - NIST 800-53: SA-10 (Developer Configuration Management) - reproducible image build
# - NIST 800-53: SI-7 (Software/Firmware Integrity) - images built from source in CI
# - NIST 800-53: CM-2 (Baseline Configuration) - single Dockerfile, pinned bases

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Least privilege: read the repo, write packages (GHCR).
permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Service images: build each arch on a NATIVE runner, then merge ----
  # rustc segfaults under QEMU user-mode emulation, so amd64 cannot be
  # cross-built on the arm64 runner. Instead each platform builds on its own
  # native runner (amd64 -> ubuntu-24.04, arm64 -> ubuntu-24.04-arm), pushes each
  # image BY DIGEST (untagged), and the `merge-services` job stitches the two
  # per-arch digests into one multi-arch manifest per service+tag.
  build-services:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Iron Bank (registry1.dso.mil) hosts the hardened UBI 10 runtime base image
      # (registry1.dso.mil/ironbank/redhat/ubi/ubi10) that the runtime stages pull.
      - name: Log in to Iron Bank (registry1.dso.mil)
        uses: docker/login-action@v4
        with:
          registry: registry1.dso.mil
          username: ${{ secrets.REPO1_USER }}
          password: ${{ secrets.REPO1 }}

      - name: Build service images (${{ matrix.arch }}) and push by digest
        shell: bash
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"   # GHCR requires a lowercase path

          # Registry-backed build cache, per-arch (layers differ by platform).
          # cache-to is written once (first service produces the builder layer),
          # every build reads cache-from.
          cache_ref="ghcr.io/${owner}/build-cache-services-${{ matrix.arch }}"

          mkdir -p /tmp/digests
          i=0
          for svc in ca-service acme-service est-service ocsp-service scms-service kra-service notify-service cli npe-portal; do
            cache_args=( --cache-from "type=registry,ref=${cache_ref}" )
            if [ "${i}" -eq 0 ]; then
              cache_args+=( --cache-to "type=registry,ref=${cache_ref},mode=max" )
            fi

            echo "::group::build ${svc} (${{ matrix.arch }})"
            docker buildx build \
              --platform "linux/${{ matrix.arch }}" \
              --target "${svc}" \
              "${cache_args[@]}" \
              --output "type=image,name=ghcr.io/${owner}/${svc},push-by-digest=true,name-canonical=true,push=true" \
              --metadata-file "/tmp/metadata-${svc}.json" \
              .
            digest="$(jq -r '."containerimage.digest"' "/tmp/metadata-${svc}.json")"
            echo "${digest}" > "/tmp/digests/${svc}"
            echo "::endgroup::"
            i=$((i + 1))
          done

      - name: Build web-ui image (${{ matrix.arch }}) and push by digest
        shell: bash
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          # web-ui builds from its own Dockerfile (separate build graph + cache).
          # Its runtime base is Iron Bank UBI 10 (uses the Iron Bank login above).
          cache_ref="ghcr.io/${owner}/build-cache-web-ui-${{ matrix.arch }}"

          echo "::group::build web-ui (${{ matrix.arch }})"
          docker buildx build \
            --file services/web-ui/Dockerfile \
            --target runtime \
            --platform "linux/${{ matrix.arch }}" \
            --cache-from "type=registry,ref=${cache_ref}" \
            --cache-to "type=registry,ref=${cache_ref},mode=max" \
            --output "type=image,name=ghcr.io/${owner}/web-ui,push-by-digest=true,name-canonical=true,push=true" \
            --metadata-file "/tmp/metadata-web-ui.json" \
            .
          jq -r '."containerimage.digest"' "/tmp/metadata-web-ui.json" > /tmp/digests/web-ui
          echo "::endgroup::"

      - name: Upload ${{ matrix.arch }} digests
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-services:
    needs: build-services
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Each arch's digests land in a subdir named after its artifact
      # (digests-amd64/, digests-arm64/).
      - name: Download per-arch digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests

      - name: Create and push multi-arch manifests
        shell: bash
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          sha="${GITHUB_SHA::7}"

          # The SHA tag is always published; latest/version only from main, and
          # the tag name (minus a leading v) for a tag push.
          extra_tags=()
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            extra_tags+=( "latest" "${version}" )
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            extra_tags+=( "${GITHUB_REF_NAME#v}" )
          fi

          for svc in ca-service acme-service est-service ocsp-service scms-service kra-service notify-service cli npe-portal web-ui; do
            img="ghcr.io/${owner}/${svc}"
            amd64_digest="$(cat "/tmp/digests/digests-amd64/${svc}")"
            arm64_digest="$(cat "/tmp/digests/digests-arm64/${svc}")"

            tag_args=( -t "${img}:sha-${sha}" )
            for t in "${extra_tags[@]}"; do
              tag_args+=( -t "${img}:${t}" )
            done

            echo "::group::manifest ${svc} (amd64=${amd64_digest} arm64=${arm64_digest})"
            docker buildx imagetools create "${tag_args[@]}" \
              "${img}@${amd64_digest}" \
              "${img}@${arm64_digest}"
            docker buildx imagetools inspect "${img}:sha-${sha}" | grep -E 'Name|Platform'
            echo "::endgroup::"
          done

          echo "Published multi-arch (amd64+arm64) images: ca-service acme-service est-service ocsp-service scms-service kra-service notify-service cli npe-portal web-ui"
