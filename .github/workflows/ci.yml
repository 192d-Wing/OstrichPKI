# OstrichPKI Continuous Integration Pipeline
#
# COMPLIANCE MAPPING:
# - NIST 800-53: SA-11 (Developer Security Testing and Evaluation)
# - NIST 800-53: CA-2 (Security Assessments)
# - NIST 800-53: SI-7 (Software, Firmware, and Information Integrity)

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ===========================================================================
  # STAGE 1: Code Quality & Formatting
  # ===========================================================================

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ===========================================================================
  # STAGE 2: Security Scanning
  # ===========================================================================

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit --deny warnings

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo deny (advisories, licenses)
        run: cargo deny check

  secrets-scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for gitleaks

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # STAGE 3: Build & Unit Tests
  # ===========================================================================

  build-and-test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable, nightly]
        include:
          - os: ubuntu-latest
            rust: stable
            coverage: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install SoftHSM (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y softhsm2
          mkdir -p ~/.config/softhsm2
          echo "directories.tokendir = $HOME/.softhsm2/tokens" > ~/.config/softhsm2/softhsm2.conf
          mkdir -p ~/.softhsm2/tokens
          softhsm2-util --init-token --slot 0 --label "ostrich-test" --pin 1234 --so-pin 5678

      - name: Install SoftHSM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install softhsm
          mkdir -p ~/.config/softhsm2
          echo "directories.tokendir = $HOME/.softhsm2/tokens" > ~/.config/softhsm2/softhsm2.conf
          mkdir -p ~/.softhsm2/tokens
          softhsm2-util --init-token --slot 0 --label "ostrich-test" --pin 1234 --so-pin 5678

      - name: Build all crates
        run: cargo build --workspace --all-features --verbose

      - name: Run unit tests
        run: cargo test --workspace --all-features --verbose
        env:
          PKCS11_MODULE_PATH: ${{ runner.os == 'Linux' && '/usr/lib/softhsm/libsofthsm2.so' || '/opt/homebrew/lib/softhsm/libsofthsm2.so' }}
          PKCS11_SLOT_ID: "0"
          PKCS11_PIN: "1234"
          CRYPTO_PROVIDER: software  # Use software crypto for CI

      - name: Run doc tests
        run: cargo test --workspace --doc --verbose

      - name: Install cargo-tarpaulin (coverage)
        if: matrix.coverage
        run: cargo install cargo-tarpaulin

      - name: Generate code coverage
        if: matrix.coverage
        run: |
          cargo tarpaulin --workspace --all-features --timeout 300 --out Xml --output-dir ./coverage
        env:
          PKCS11_MODULE_PATH: /usr/lib/softhsm/libsofthsm2.so
          CRYPTO_PROVIDER: software

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/cobertura.xml
          fail_ci_if_error: false

  # ===========================================================================
  # STAGE 4: Integration Tests
  # ===========================================================================

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ostrich_test
          POSTGRES_PASSWORD: test_password_insecure
          POSTGRES_DB: ostrich_pki_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install SoftHSM
        run: |
          sudo apt-get update
          sudo apt-get install -y softhsm2
          mkdir -p ~/.config/softhsm2
          echo "directories.tokendir = $HOME/.softhsm2/tokens" > ~/.config/softhsm2/softhsm2.conf
          mkdir -p ~/.softhsm2/tokens
          softhsm2-util --init-token --slot 0 --label "ostrich-test" --pin 1234 --so-pin 5678

      - name: Run database migrations
        run: |
          cargo install sqlx-cli --no-default-features --features postgres
          sqlx database create
          sqlx migrate run
        env:
          DATABASE_URL: postgresql://ostrich_test:test_password_insecure@localhost:5432/ostrich_pki_test

      - name: Build test binaries
        run: cargo build --tests --workspace

      - name: Run integration tests
        run: cargo test --test '*' -- --test-threads=1
        env:
          DATABASE_URL: postgresql://ostrich_test:test_password_insecure@localhost:5432/ostrich_pki_test
          PKCS11_MODULE_PATH: /usr/lib/softhsm/libsofthsm2.so
          PKCS11_SLOT_ID: "0"
          PKCS11_PIN: "1234"
          CRYPTO_PROVIDER: software
          RUST_LOG: info

  # ===========================================================================
  # STAGE 5: Performance Benchmarks
  # ===========================================================================

  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Install SoftHSM
        run: |
          sudo apt-get update
          sudo apt-get install -y softhsm2
          mkdir -p ~/.config/softhsm2
          echo "directories.tokendir = $HOME/.softhsm2/tokens" > ~/.config/softhsm2/softhsm2.conf
          mkdir -p ~/.softhsm2/tokens
          softhsm2-util --init-token --slot 0 --label "ostrich-bench" --pin 1234 --so-pin 5678

      - name: Run benchmarks
        run: cargo bench --workspace
        env:
          PKCS11_MODULE_PATH: /usr/lib/softhsm/libsofthsm2.so
          CRYPTO_PROVIDER: software

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: target/criterion/output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true

  # ===========================================================================
  # STAGE 6: SBOM Generation (Supply Chain Security)
  # ===========================================================================

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-sbom
        run: cargo install cargo-sbom

      - name: Generate SBOM (SPDX)
        run: cargo sbom > sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json

  # ===========================================================================
  # STAGE 7: Compliance Documentation Check
  # ===========================================================================

  compliance-check:
    name: Compliance Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check compliance docs exist
        run: |
          test -f docs/compliance/NIST_800-53_MAPPING.md
          test -f docs/compliance/NIAP_COMPLIANCE.md
          test -f docs/compliance/RFC_COMPLIANCE.md
          test -f docs/compliance/FIPS_COMPLIANCE.md
          test -f docs/compliance/ATO_EVIDENCE.md
          echo "✓ All compliance documentation files present"

      - name: Validate compliance annotations in code
        run: |
          # Count NIST 800-53 annotations
          NIST_COUNT=$(grep -r "NIST 800-53:" crates/ | wc -l)
          echo "Found $NIST_COUNT NIST 800-53 annotations"

          # Count NIAP PP-CA annotations
          NIAP_COUNT=$(grep -r "NIAP PP-CA:" crates/ | wc -l)
          echo "Found $NIAP_COUNT NIAP PP-CA annotations"

          # Require minimum annotations (adjust threshold as needed)
          if [ $NIST_COUNT -lt 50 ]; then
            echo "⚠️  Warning: Low NIST 800-53 annotation count"
          fi

  # ===========================================================================
  # Summary Job
  # ===========================================================================

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - lint
      - security
      - secrets-scan
      - build-and-test
      - integration-tests
      - compliance-check
    steps:
      - name: All checks passed
        run: echo "✅ All CI checks passed successfully"
