name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default; jobs that need more request it explicitly.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---- Blocking gate: the workspace must build and unit/lib tests must pass ----
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # aws-lc-rs (PQC / crypto) builds C/asm; install its toolchain.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake clang libclang-dev pkg-config nasm protobuf-compiler libssl-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --locked

      # Unit/lib + binary tests only. Integration suites that need external
      # infrastructure (PostgreSQL, a PKCS#11 HSM) are intentionally excluded
      # here — they run in a separate, infra-provisioned workflow.
      - name: Test
        run: cargo test --workspace --lib --bins --locked

  # ---- Blocking gate: the web-ui frontend must compile for wasm32 ----
  # The Yew client is `#[cfg(target_arch = "wasm32")]`-gated, so the host
  # build above never compiles it. This job is the only thing that catches
  # frontend regressions. Its wasm32 dependency set is just yew + wasm-bindgen
  # (the heavy server/crypto deps are cfg(not(wasm32))), so no extra apt deps.
  web-ui-wasm:
    name: Web UI (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build web-ui for wasm32
        run: cargo build -p ostrich-web-ui --target wasm32-unknown-unknown --locked

  # ---- Advisory checks (non-blocking for now) ----
  # These surface drift without failing PRs while pre-existing debt is paid down:
  #   * rustfmt: the tree is not yet fully `cargo fmt`-normalized (~231 files).
  #   * clippy:  a handful of pre-existing warnings remain across some crates.
  # Once both are clean, drop `continue-on-error` to make them required gates.
  clippy:
    name: Clippy (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake clang libclang-dev pkg-config nasm protobuf-compiler libssl-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  rustfmt:
    name: Rustfmt (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # NOTE: the dependency vulnerability scan (cargo audit) lives in its own
  # workflow (.github/workflows/audit.yml). It only depends on the dependency
  # set, so it runs when a manifest/lockfile changes or on a weekly schedule —
  # not on every PR — which keeps it off the per-PR critical path.
