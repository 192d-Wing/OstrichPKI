name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default; jobs that need more request it explicitly.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---- Blocking gate: the workspace must build and unit/lib tests must pass ----
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # aws-lc-rs (PQC / crypto) builds C/asm; install its toolchain.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake clang libclang-dev pkg-config nasm protobuf-compiler libssl-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --locked

      # Unit/lib + binary tests only. Integration suites that need external
      # infrastructure (PostgreSQL, a PKCS#11 HSM) are intentionally excluded
      # here — they run in a separate, infra-provisioned workflow.
      - name: Test
        run: cargo test --workspace --lib --bins --locked

  # ---- React frontend (the web-ui console) ----
  # Builds the services/web-ui/web SPA and enforces the npm supply-chain
  # controls. This is the deployed console (the former Yew/WASM client was
  # retired in the /next → / cutover).
  #
  # COMPLIANCE MAPPING:
  # - NIST 800-53: CM-2  (Baseline Configuration) — frozen-lockfile install
  # - NIST 800-53: RA-5  (Vulnerability Monitoring) — pnpm audit gate
  # - NIST 800-53: SI-7 / SA-12 (Integrity / Supply Chain) — CycloneDX SBOM
  web-ui-react:
    name: Web UI (React build + supply-chain)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web-ui/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Enable pnpm (corepack; version pinned by packageManager)
        run: corepack enable
      - name: Install (frozen lockfile — CM-2)
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
      - name: Audit production dependencies (RA-5)
        run: pnpm audit --prod --audit-level=high
      # SBOM via cdxgen (pnpm-aware). Best-effort during P1 (the tool is heavy);
      # hardens to a required step at cutover. The audit step above is the
      # blocking supply-chain gate.
      - name: Generate CycloneDX SBOM (SI-7 / SA-12)
        continue-on-error: true
        run: pnpm dlx @cyclonedx/cdxgen@^11 -t pnpm --no-recurse -o sbom.web-ui.json .
      - name: Upload SBOM artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: web-ui-sbom
          path: services/web-ui/web/sbom.web-ui.json
          if-no-files-found: ignore

  # ---- Advisory checks (non-blocking for now) ----
  # These surface drift without failing PRs while pre-existing debt is paid down:
  #   * rustfmt: the tree is not yet fully `cargo fmt`-normalized (~231 files).
  #   * clippy:  a handful of pre-existing warnings remain across some crates.
  # Once both are clean, drop `continue-on-error` to make them required gates.
  clippy:
    name: Clippy (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake clang libclang-dev pkg-config nasm protobuf-compiler libssl-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  rustfmt:
    name: Rustfmt (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # NOTE: the dependency vulnerability scan (cargo audit) lives in its own
  # workflow (.github/workflows/audit.yml). It only depends on the dependency
  # set, so it runs when a manifest/lockfile changes or on a weekly schedule —
  # not on every PR — which keeps it off the per-PR critical path.
