# OstrichPKI Helm Chart Values
#
# COMPLIANCE MAPPING:
# - NIST 800-53: CM-6 (Configuration Settings)
# - NIST 800-53: SC-8 (Transmission Confidentiality)
# - NIST 800-53: AC-6 (Least Privilege)

# Global settings
global:
  # Registry override applied to every service image (takes precedence over
  # image.registry below). Leave empty to use image.registry.
  imageRegistry: ""
  # Image pull secrets
  imagePullSecrets: []
  # Storage class for persistent volumes
  storageClass: ""

# Common image settings
#
# Each service is its own image, published as <registry>/<service>-service:<tag>
# by .github/workflows/docker-publish.yml (e.g. ghcr.io/192d-wing/ca-service).
# Per-service `image.repository`/`image.tag` (below) override these defaults.
image:
  registry: ghcr.io/192d-wing
  pullPolicy: Always
  tag: latest  # Pin per environment (e.g. sha-<commit>); empty falls back to appVersion

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod security context (NIST 800-53: AC-6)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Container security context (NIST 800-53: AC-6)
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

# =============================================================================
# Certificate Authority Service
# =============================================================================
ca:
  enabled: true
  replicaCount: 1

  image:
    repository: ""  # Uses global if empty
    tag: ""         # Uses global if empty

  # REST API
  rest:
    port: 8080
    service:
      type: ClusterIP
      port: 8080

  # gRPC API
  grpc:
    port: 50051
    service:
      type: ClusterIP
      port: 50051

  # CA certificate and key
  # NIST 800-53: SC-12 (Cryptographic Key Establishment)
  caCert:
    # Use existing secret for CA cert/key
    existingSecret: ""
    # Or specify paths (mounted via volumes)
    certFile: ""
    keyFile: ""

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Extra environment variables
  extraEnv: []

  # Extra volumes and mounts
  extraVolumes: []
  extraVolumeMounts: []

# =============================================================================
# ACME Service (RFC 8555)
# =============================================================================
acme:
  enabled: true
  replicaCount: 2

  image:
    repository: ""
    tag: ""

  service:
    type: ClusterIP
    port: 8080

  # External base URL for ACME directory (e.g. https://acme.example.com)
  baseUrl: ""

  # SSRF guard: when false, orders for private-IP / internal domains are
  # rejected. Keep false in production; only an in-cluster E2E flips it.
  allowPrivateIpDomains: false

  # Port the http-01 challenge validator connects to on the client.
  http01Port: 80

  # Ingress for external ACME access
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: acme.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 64Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

# =============================================================================
# EST Service (RFC 7030)
# =============================================================================
est:
  enabled: true
  replicaCount: 1

  image:
    repository: ""
    tag: ""

  service:
    type: ClusterIP
    port: 8443

  # Accept bearer-token auth in addition to mTLS (RFC 7030 §3.2).
  allowBearerAuth: true

  # mTLS configuration (required per RFC 7030)
  # NIST 800-53: SC-8 (Transmission Confidentiality)
  tls:
    existingSecret: ""
    certFile: ""
    keyFile: ""
    caCertFile: ""

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 64Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

# =============================================================================
# NPE Portal (Non-Person Entity enrollment portal; mTLS BFF + React SPA)
# =============================================================================
npePortal:
  enabled: true
  # Active-active behind the load balancer (IL5 posture).
  replicaCount: 2

  image:
    repository: npe-portal
    tag: ""

  service:
    type: ClusterIP
    port: 8443

  # Development escape hatch only: serve without mandatory mTLS. NEVER set true
  # in production — the OID->role authentication requires a verified client cert.
  allowInsecure: false

  # mTLS material. existingSecret mounts server cert/key + client CA at /app/certs;
  # the *File paths point into that mount. SC-8 / IA-2.
  tls:
    existingSecret: ""
    certFile: "/app/certs/tls.crt"
    keyFile: "/app/certs/tls.key"
    clientCaFile: "/app/certs/client-ca.crt"

  # Portal config (rendered to npe-portal.json) unless existingConfigMap is set.
  # Backends are reached over the in-cluster service DNS; production sets the
  # backend mTLS material so the identity bridge runs authenticated.
  existingConfigMap: ""
  config:
    backend:
      caUrl: "https://ostrich-pki-ca:8080"
      estUrl: "https://ostrich-pki-est:8443"
    session:
      cookieName: "ostrich_npe_session"
      inactivityTimeoutSecs: 1800
      absoluteTimeoutSecs: 28800
      secureCookies: true
    oidMapping:
      sponsorOids: ["2.16.840.1.101.2.1.11.42"]
      adminOid: "2.16.840.1.101.2.1.11.43"
      raOids: ["2.16.840.1.101.2.1.11.44"]
      caaOids: ["2.16.840.1.101.2.1.11.45"]
      allowedIssuers: ["CN=Example NPE Issuing CA,O=U.S. Government,C=US"]
    classificationBanner: "CUI"
    cspNonceLength: 16
    staticFiles:
      directory: "/app/static"
      urlPrefix: "/static"

  # Per-network ingress hosts (e.g. npe.<niprnet-domain> / npe.<sipr-domain>).
  #
  # CRITICAL: the portal terminates mTLS itself and derives the operator's role
  # from the client certificate. The ingress MUST pass the TLS connection through
  # to the portal (ssl-passthrough) — do NOT let the ingress terminate TLS, or it
  # strips the client certificate and every request fails authentication (IA-2).
  # Set the passthrough annotation for your controller (e.g. for ingress-nginx:
  # nginx.ingress.kubernetes.io/ssl-passthrough: "true"), and leave `tls` empty
  # (a `tls` block here implies the ingress re-terminates TLS — incompatible with
  # mTLS passthrough).
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: npe.oopl.dev.mil
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 64Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

# =============================================================================
# OCSP Responder (RFC 6960)
# =============================================================================
ocsp:
  enabled: true
  replicaCount: 2

  image:
    repository: ""
    tag: ""

  service:
    type: ClusterIP
    port: 8081

  # OCSP signing certificate
  signing:
    existingSecret: ""
    certFile: ""
    keyFile: ""

  # Ingress for external OCSP access
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: ocsp.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 64Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

# =============================================================================
# SCMS Service (Smartcard Management)
# =============================================================================
scms:
  enabled: false  # Disabled by default
  replicaCount: 1

  image:
    repository: ""
    tag: ""

  service:
    type: ClusterIP
    port: 8082

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 64Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

# =============================================================================
# KRA Service (Key Recovery Authority)
# =============================================================================
kra:
  enabled: false  # Disabled by default
  replicaCount: 1

  image:
    repository: ""
    tag: ""

  service:
    type: ClusterIP
    port: 8083

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 64Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

# =============================================================================
# PostgreSQL Database
# =============================================================================
postgresql:
  enabled: true
  auth:
    username: ostrich
    password: ""  # Set this or use existingSecret
    database: ostrich_pki
    existingSecret: ""
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 256Mi

# External database (if postgresql.enabled=false)
externalDatabase:
  host: ""
  port: 5432
  user: ostrich
  password: ""
  database: ostrich_pki
  existingSecret: ""
  existingSecretPasswordKey: password

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  # Log level: trace, debug, info, warn, error
  level: info
  # Use JSON format for structured logging
  json: true

# =============================================================================
# Monitoring
# =============================================================================
metrics:
  enabled: true
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s
    labels: {}

# =============================================================================
# Network Policies (NIST 800-53: SC-7)
# =============================================================================
networkPolicy:
  enabled: true
  # Allow ingress from specified namespaces
  ingressNamespaceLabels: {}
  # Allow egress to external services
  egressRules: []
