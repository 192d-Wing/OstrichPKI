{{/*
OstrichPKI ACME Service

COMPLIANCE MAPPING:
- RFC 8555: ACME Protocol
*/}}
{{- if .Values.acme.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ostrich-pki.fullname" . }}-acme
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ostrich-pki.labels" . | nindent 4 }}
    app.kubernetes.io/component: acme
spec:
  type: {{ .Values.acme.service.type }}
  ports:
    - port: {{ .Values.acme.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ostrich-pki.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: acme
{{- end }}
