{{/*
OstrichPKI OCSP Responder Deployment

COMPLIANCE MAPPING:
- RFC 6960: OCSP Protocol
- NIST 800-53: SC-17 (PKI Certificates)
*/}}
{{- if .Values.ocsp.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ostrich-pki.fullname" . }}-ocsp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ostrich-pki.labels" . | nindent 4 }}
    app.kubernetes.io/component: ocsp
spec:
  replicas: {{ .Values.ocsp.replicaCount }}
  selector:
    matchLabels:
      {{- include "ostrich-pki.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ocsp
  template:
    metadata:
      labels:
        {{- include "ostrich-pki.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ocsp
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ostrich-pki.serviceAccountName" . }}
      securityContext:
        {{- include "ostrich-pki.podSecurityContext" . | nindent 8 }}
      initContainers:
        {{- include "ostrich-pki.waitForCa" . | nindent 8 }}
      containers:
        - name: ocsp
          securityContext:
            {{- include "ostrich-pki.securityContext" . | nindent 12 }}
          image: {{ include "ostrich-pki.image" (dict "service" "ocsp" "repository" .Values.ocsp.image.repository "tag" .Values.ocsp.image.tag "root" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            {{- include "ostrich-pki.commonEnv" . | nindent 12 }}
            - name: OCSP_BIND_ADDRESS
              value: "0.0.0.0:8081"
            - name: CA_GRPC_URL
              value: {{ include "ostrich-pki.caGrpcUrl" . | quote }}
            - name: CA_GRPC_INSECURE
              value: "true"
            {{- if .Values.ocsp.signing.certFile }}
            - name: OCSP_SIGNING_CERT
              value: {{ .Values.ocsp.signing.certFile | quote }}
            {{- end }}
            {{- if .Values.ocsp.signing.keyFile }}
            - name: OCSP_SIGNING_KEY
              value: {{ .Values.ocsp.signing.keyFile | quote }}
            {{- end }}
            {{- with .Values.ocsp.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.ocsp.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.ocsp.signing.existingSecret }}
            - name: ocsp-certs
              mountPath: /app/certs
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.ocsp.signing.existingSecret }}
        - name: ocsp-certs
          secret:
            secretName: {{ .Values.ocsp.signing.existingSecret }}
        {{- end }}
      {{- with .Values.ocsp.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ocsp.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ocsp.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
