{{/*
OstrichPKI ACME Ingress

COMPLIANCE MAPPING:
- RFC 8555: ACME Protocol
- NIST 800-53: SC-8 (Transmission Confidentiality)
*/}}
{{- if and .Values.acme.enabled .Values.acme.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ostrich-pki.fullname" . }}-acme
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ostrich-pki.labels" . | nindent 4 }}
    app.kubernetes.io/component: acme
  {{- with .Values.acme.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.acme.ingress.className }}
  ingressClassName: {{ .Values.acme.ingress.className }}
  {{- end }}
  {{- if .Values.acme.ingress.tls }}
  tls:
    {{- range .Values.acme.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.acme.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "ostrich-pki.fullname" $ }}-acme
                port:
                  number: {{ $.Values.acme.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
