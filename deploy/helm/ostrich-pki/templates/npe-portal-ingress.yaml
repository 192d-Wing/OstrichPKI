{{/*
OstrichPKI NPE Portal Ingress

Per-network ingress hosts (e.g. npe.<niprnet-domain> / npe.<sipr-domain>). The
portal terminates mTLS itself, so the ingress must pass the client certificate
through (e.g. ssl-passthrough) rather than re-terminating TLS.

COMPLIANCE MAPPING:
- NIST 800-53: SC-8 (Transmission Confidentiality), IA-2 (mTLS to the portal)
*/}}
{{- if and .Values.npePortal.enabled .Values.npePortal.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ostrich-pki.fullname" . }}-npe-portal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ostrich-pki.labels" . | nindent 4 }}
    app.kubernetes.io/component: npe-portal
  {{- with .Values.npePortal.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.npePortal.ingress.className }}
  ingressClassName: {{ .Values.npePortal.ingress.className }}
  {{- end }}
  {{- if .Values.npePortal.ingress.tls }}
  tls:
    {{- range .Values.npePortal.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.npePortal.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "ostrich-pki.fullname" $ }}-npe-portal
                port:
                  number: {{ $.Values.npePortal.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
