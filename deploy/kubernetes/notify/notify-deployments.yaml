# notify-service: two roles of the same image — scheduler and sender.
#
# Prerequisites (see README):
#   - NATS + notify-postgres (this overlay) running
#   - Secret notify-db-secret (key: database-url)
#   - Sender: set SMTP_HOST/SMTP_FROM (and SMTP_SECURITY=none|starttls|tls + creds
#     if your relay needs them) in notify.env
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notify-scheduler
  namespace: ostrich-pki
  labels: { app: notify-scheduler, component: notify }
spec:
  replicas: 1
  selector:
    matchLabels: { app: notify-scheduler }
  template:
    metadata:
      labels: { app: notify-scheduler, component: notify }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: notify-scheduler
          image: ghcr.io/192d-wing/notify-service:latest
          imagePullPolicy: Always
          ports:
            - { name: health, containerPort: 8090 }
          envFrom:
            # NATS_URL + NOTIFY_TICK_SECONDS come from the notify.env variable file.
            - configMapRef: { name: notify-config }
          env:
            - { name: RUST_LOG, value: "info" }
            - { name: NOTIFY_ROLE, value: "scheduler" }
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: notify-db-secret, key: database-url }
            # NATS password auth (NATS_URL + NATS_CA_FILE come from notify.env).
            - name: NATS_USER
              valueFrom: { secretKeyRef: { name: nats-auth, key: NATS_USER } }
            - name: NATS_PASSWORD
              valueFrom: { secretKeyRef: { name: nats-auth, key: NATS_PASSWORD } }
          volumeMounts:
            - { name: nats-client-ca, mountPath: /etc/nats-ca, readOnly: true }
          livenessProbe:
            httpGet: { path: /health, port: health }
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /ready, port: health }
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: true
          resources:
            requests: { cpu: "25m", memory: "32Mi" }
            limits: { cpu: "250m", memory: "128Mi" }
      volumes:
        - name: nats-client-ca
          secret:
            secretName: nats-client-ca
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notify-sender
  namespace: ostrich-pki
  labels: { app: notify-sender, component: notify }
spec:
  replicas: 1
  selector:
    matchLabels: { app: notify-sender }
  template:
    metadata:
      labels: { app: notify-sender, component: notify }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: notify-sender
          image: ghcr.io/192d-wing/notify-service:latest
          imagePullPolicy: Always
          ports:
            - { name: health, containerPort: 8090 }
          envFrom:
            # NATS_URL + SMTP_HOST/PORT/FROM/SECURITY come from the notify.env
            # variable file (configMapGenerator -> notify-config).
            - configMapRef: { name: notify-config }
          env:
            - { name: RUST_LOG, value: "info" }
            - { name: NOTIFY_ROLE, value: "sender" }
            # If your relay requires auth, add the password from a secret:
            # - name: SMTP_PASSWORD
            #   valueFrom: { secretKeyRef: { name: notify-smtp-secret, key: password } }
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: notify-db-secret, key: database-url }
            # NATS password auth (NATS_URL + NATS_CA_FILE come from notify.env).
            - name: NATS_USER
              valueFrom: { secretKeyRef: { name: nats-auth, key: NATS_USER } }
            - name: NATS_PASSWORD
              valueFrom: { secretKeyRef: { name: nats-auth, key: NATS_PASSWORD } }
          volumeMounts:
            - { name: nats-client-ca, mountPath: /etc/nats-ca, readOnly: true }
          livenessProbe:
            httpGet: { path: /health, port: health }
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /ready, port: health }
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: true
          resources:
            requests: { cpu: "25m", memory: "32Mi" }
            limits: { cpu: "250m", memory: "128Mi" }
      volumes:
        - name: nats-client-ca
          secret:
            secretName: nats-client-ca
