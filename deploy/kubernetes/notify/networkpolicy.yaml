# NetworkPolicies for the notify subsystem.
#
# The `ostrich-pki` namespace previously had NO NetworkPolicies, so any pod on
# the cluster could reach NATS (nats:4222) and publish `email.send` (turning the
# authenticated org SMTP relay into an open mail origin) or `cert.expiry.notify`
# tombstones (silently suppressing real expiry warnings), and could reach the
# notify Postgres directly. These policies restrict those services to their known
# clients. The CNI is Cilium, which enforces NetworkPolicy.
#
# COMPLIANCE MAPPING:
# - NIST 800-53: AC-3 (Access Enforcement), AC-4 (Information Flow Enforcement),
#   SC-7 (Boundary Protection), AC-17 (restrict internal service reachability)
# - NIAP PP-CA: FDP_IFC.1 / FDP_IFF.1 (information-flow control)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nats-restrict-clients
  namespace: ostrich-pki
  labels:
    app.kubernetes.io/part-of: ostrich-pki
spec:
  podSelector:
    matchLabels:
      app: nats
  policyTypes:
    - Ingress
  ingress:
    # NATS client protocol (4222): ONLY the three legitimate JetStream clients —
    # ca-server (publishes cert.expiry), notify-scheduler, notify-sender.
    - from:
        - podSelector:
            matchLabels:
              app: ca-server
        - podSelector:
            matchLabels:
              app: notify-scheduler
        - podSelector:
            matchLabels:
              app: notify-sender
      ports:
        - protocol: TCP
          port: 4222
    # Monitoring/health endpoint (8222): the pod's own liveness/readiness probes
    # hit this port, and it is read-only monitoring — leave it reachable.
    - ports:
        - protocol: TCP
          port: 8222
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: notify-postgres-restrict-clients
  namespace: ostrich-pki
  labels:
    app.kubernetes.io/part-of: ostrich-pki
spec:
  podSelector:
    matchLabels:
      app: notify-postgres
  policyTypes:
    - Ingress
  ingress:
    # Only the notify scheduler + sender use the notify database.
    - from:
        - podSelector:
            matchLabels:
              app: notify-scheduler
        - podSelector:
            matchLabels:
              app: notify-sender
      ports:
        - protocol: TCP
          port: 5432
