# NATS server configuration: JetStream + TLS + password authorization.
#
# The password comes from the operator-supplied `nats-auth` secret via env
# expansion ($NATS_USER / $NATS_PASSWORD); the server certificate + CA come from
# the operator-supplied `nats-server-tls` secret mounted at /etc/nats/tls.
#
# Operator prerequisites (NOT committed — like notify-db-secret):
#   # server cert (SANs: nats, nats.ostrich-pki[.svc[.cluster.local]]) + CA:
#   kubectl -n ostrich-pki create secret generic nats-server-tls \
#     --from-file=tls.crt=nats-server.crt --from-file=tls.key=nats-server.key \
#     --from-file=ca.crt=nats-ca.crt
#   # the CA cert clients trust:
#   kubectl -n ostrich-pki create secret generic nats-client-ca --from-file=ca.crt=nats-ca.crt
#   # credentials:
#   kubectl -n ostrich-pki create secret generic nats-auth \
#     --from-literal=NATS_USER=ostrich --from-literal=NATS_PASSWORD="$(openssl rand -base64 24)"
#
# COMPLIANCE MAPPING:
# - NIST 800-53: SC-8 / SC-13 (TLS in transit), AC-3 / IA-2 (authenticated clients)
# - NIAP PP-CA: FCS_TLSS_EXT.1, FIA_UAU.1
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: ostrich-pki
  labels:
    app: nats
data:
  nats.conf: |
    # JetStream persistent store (PVC-backed).
    jetstream {
      store_dir: "/data"
    }
    # Monitoring/health endpoint (probes hit /healthz here).
    http: 8222
    # Password authorization — credentials injected from the nats-auth secret.
    authorization {
      user: $NATS_USER
      password: $NATS_PASSWORD
    }
    # Server-side TLS on the client port (4222). Clients verify the server against
    # the CA; client-cert auth is not required (they authenticate by password).
    tls {
      cert_file: "/etc/nats/tls/tls.crt"
      key_file: "/etc/nats/tls/tls.key"
      ca_file: "/etc/nats/tls/ca.crt"
      verify: false
    }
