# OstrichPKI EST Service Deployment (RFC 7030)
#
# COMPLIANCE MAPPING:
# - NIST 800-53: SC-17 (PKI Certificates), IA-2 (enrollment auth)
# - NIST 800-53: CM-2 (Baseline Configuration)
#
# Per-service image (ghcr.io/192d-wing/est-service). Finalizes enrollments via
# the CA over gRPC; waits for the CA to be bootstrapped before starting.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: est-server
  namespace: ostrich-pki
  labels:
    app: est-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: est-server
  template:
    metadata:
      labels:
        app: est-server
    spec:
      serviceAccountName: ostrich-pki
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-ca
          image: postgres:16-alpine
          command: ["sh", "-c"]
          args:
            - |
              until psql "$DATABASE_URL" -tAc "SELECT 1 FROM ca_certificates WHERE is_root = false LIMIT 1" 2>/dev/null | grep -q 1; do
                echo "waiting for CA bootstrap..."; sleep 3;
              done
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ostrich-secrets
                  key: DATABASE_URL
      containers:
        - name: est-server
          image: ghcr.io/192d-wing/est-service:latest
          imagePullPolicy: Always
          ports:
            - { name: http, containerPort: 8443 }
          env:
            - { name: RUST_LOG, value: "info" }
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ostrich-secrets
                  key: DATABASE_URL
            - { name: EST_BIND_ADDRESS, value: "0.0.0.0:8443" }
            - { name: CA_GRPC_URL, value: "http://ca-service:50051" }
            - { name: CA_GRPC_INSECURE, value: "true" }
            - { name: EST_ALLOW_BEARER_AUTH, value: "true" }
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
