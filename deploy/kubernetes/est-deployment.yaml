# OstrichPKI EST Service Deployment
#
# COMPLIANCE MAPPING:
# - RFC 7030: EST Protocol
# - NIST 800-53: SC-8 (Transmission Confidentiality - mTLS)
# - NIST 800-53: SC-17 (PKI Certificates)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ostrich-pki-est
  namespace: ostrich-pki
  labels:
    app.kubernetes.io/name: ostrich-pki
    app.kubernetes.io/component: est
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ostrich-pki
      app.kubernetes.io/component: est
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ostrich-pki
        app.kubernetes.io/component: est
    spec:
      serviceAccountName: ostrich-pki
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: est
          image: ostrich-pki:latest
          imagePullPolicy: IfNotPresent
          args:
            - --target
            - est-service
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
          env:
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: ostrich-pki-config
                  key: RUST_LOG
            - name: LOG_JSON
              valueFrom:
                configMapKeyRef:
                  name: ostrich-pki-config
                  key: LOG_JSON
            - name: DATABASE_URL
              value: "postgresql://ostrich:$(DATABASE_PASSWORD)@ostrich-pki-postgresql:5432/ostrich_pki"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ostrich-pki-db
                  key: password
            - name: EST_BIND_ADDRESS
              value: "0.0.0.0:8443"
            - name: TLS_CERT_FILE
              value: "/app/certs/tls.crt"
            - name: TLS_KEY_FILE
              value: "/app/certs/tls.key"
          livenessProbe:
            httpGet:
              path: /health
              port: https
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: https
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: est-certs
              mountPath: /app/certs
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: est-certs
          secret:
            secretName: ostrich-pki-est-certs
