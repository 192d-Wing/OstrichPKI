# OstrichPKI EST Service Deployment (RFC 7030)
#
# COMPLIANCE MAPPING:
# - NIST 800-53: SC-17 (PKI Certificates), IA-2 (enrollment auth)
# - NIST 800-53: CM-2 (Baseline Configuration)
#
# Per-service image (ghcr.io/192d-wing/est-service). Finalizes enrollments via
# the CA over gRPC; waits for the CA to be bootstrapped before starting.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: est-server
  namespace: ostrich-pki
  labels:
    app: est-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: est-server
  template:
    metadata:
      labels:
        app: est-server
    spec:
      serviceAccountName: ostrich-pki
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-ca
          image: postgres:16-alpine
          command: ["sh", "-c"]
          args:
            - |
              until psql "$DATABASE_URL" -tAc "SELECT 1 FROM ca_certificates WHERE is_root = false LIMIT 1" 2>/dev/null | grep -q 1; do
                echo "waiting for CA bootstrap..."; sleep 3;
              done
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ostrich-secrets
                  key: DATABASE_URL
      containers:
        - name: est-server
          image: ghcr.io/192d-wing/est-service:latest
          imagePullPolicy: Always
          ports:
            - { name: https, containerPort: 8443 }
          env:
            - { name: RUST_LOG, value: "info" }
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ostrich-secrets
                  key: DATABASE_URL
            - { name: EST_BIND_ADDRESS, value: "0.0.0.0:8443" }
            - { name: CA_GRPC_URL, value: "http://ca-service:50051" }
            - { name: CA_GRPC_INSECURE, value: "true" }
            # The pod now terminates TLS itself (Traefik passes raw TLS through;
            # see ostrich-ingress.yaml) so it can see the client certificate.
            # RFC 7030 §3.3: /simplereenroll authenticates by the client cert,
            # /simpleenroll by a single-use bearer enrollment token. Client certs
            # are requested but NOT required (EST_MTLS_TOKEN_BOOTSTRAP), so
            # certificate-less bootstrap still completes the handshake.
            # NIST 800-53: SC-8 (TLS) / AC-17 (mTLS client auth).
            - { name: TLS_CERT_FILE, value: "/etc/est/tls/tls.crt" }
            - { name: TLS_KEY_FILE, value: "/etc/est/tls/tls.key" }
            - { name: TLS_CA_CERT_FILE, value: "/etc/est/client-ca/ca.crt" }
            - { name: EST_MTLS_TOKEN_BOOTSTRAP, value: "true" }
          volumeMounts:
            # Server certificate for est.oopl.dev.mil (the cert Traefik formerly
            # presented for this host).
            - { name: est-tls, mountPath: /etc/est/tls, readOnly: true }
            # CA that issued the device bootstrap certificates; used to verify
            # re-enrollment client certificates.
            - { name: est-client-ca, mountPath: /etc/est/client-ca, readOnly: true }
          livenessProbe:
            # The pod serves HTTPS now; /health is public and client auth is
            # optional, so a no-cert probe still succeeds. kubelet does not
            # verify the server certificate for an HTTPS probe.
            httpGet: { path: /health, port: https, scheme: HTTPS }
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /ready, port: https, scheme: HTTPS }
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
      volumes:
        # Server cert/key for est.oopl.dev.mil (standard kubernetes.io/tls keys
        # tls.crt + tls.key); reuses the existing ingress certificate secret.
        - name: est-tls
          secret:
            secretName: ostrich-ingress-tls
        # Client CA bundle (key ca.crt) — the CA whose certificates devices
        # present for re-enrollment. Provisioned out-of-band (see secrets.yaml).
        - name: est-client-ca
          secret:
            secretName: est-client-ca
