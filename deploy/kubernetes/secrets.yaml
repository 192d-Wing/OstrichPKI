# OstrichPKI Secrets Template
#
# COMPLIANCE MAPPING:
# - NIST 800-53: SC-28 (Protection of Information at Rest)
# - NIST 800-53: SC-12 (Cryptographic Key Establishment)
#
# WARNING: This is a TEMPLATE. Do NOT commit real secret values. In production:
#   1. Use external secrets (Vault, AWS/GCP Secrets Manager, SealedSecrets/SOPS).
#   2. Provide the secret out-of-band; never store live credentials in git.
#
# Every service reads the full connection string from ostrich-secrets/DATABASE_URL
# (matching the running cluster). TLS for the public endpoints is terminated at
# the ingress with a CA-issued cert in a separate, environment-provisioned secret
# (e.g. ostrich-ingress-tls), not here. CA signing keys live in the HSM/SoftHSM,
# not in a Kubernetes Secret.
apiVersion: v1
kind: Secret
metadata:
  name: ostrich-secrets
  namespace: ostrich-pki
  labels:
    app.kubernetes.io/name: ostrich-pki
type: Opaque
stringData:
  # CHANGE THIS — full PostgreSQL connection string for the services.
  DATABASE_URL: "postgresql://ostrich:CHANGE_ME@postgres:5432/ostrich_pki?sslmode=disable"
---
# EST re-enrollment client CA (TEMPLATE — provide out-of-band, do NOT commit the
# real value). The est pod terminates TLS on its mTLS port (8444) and verifies
# re-enrollment client certificates against this CA (key `ca.crt`) — the CA that
# issued the device bootstrap certificates (typically the OstrichPKI issuing CA).
# Mounted by est-deployment.yaml at /etc/est/client-ca.
#
# Provision, e.g.:
#   kubectl -n ostrich-pki create secret generic est-client-ca \
#     --from-file=ca.crt=issuing-ca-chain.pem
#
# NIST 800-53: SC-12 (key establishment), IA-7 (cryptographic module auth).
apiVersion: v1
kind: Secret
metadata:
  name: est-client-ca
  namespace: ostrich-pki
  labels:
    app.kubernetes.io/name: ostrich-pki
type: Opaque
stringData:
  # CHANGE THIS — PEM CA bundle that issued the device bootstrap certificates.
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    CHANGE_ME_EST_REENROLL_CLIENT_CA
    -----END CERTIFICATE-----
