# OstrichPKI Secrets Template
#
# COMPLIANCE MAPPING:
# - NIST 800-53: SC-28 (Protection of Information at Rest)
# - NIST 800-53: SC-12 (Cryptographic Key Establishment)
#
# WARNING: This is a template. In production:
# 1. Use external secrets management (Vault, AWS Secrets Manager, etc.)
# 2. Never commit secrets to version control
# 3. Use SealedSecrets or SOPS for GitOps workflows

apiVersion: v1
kind: Secret
metadata:
  name: ostrich-pki-db
  namespace: ostrich-pki
  labels:
    app.kubernetes.io/name: ostrich-pki
    app.kubernetes.io/component: database
type: Opaque
stringData:
  # CHANGE THIS IN PRODUCTION
  password: "CHANGE_ME_BEFORE_DEPLOY"
---
apiVersion: v1
kind: Secret
metadata:
  name: ostrich-pki-ca-certs
  namespace: ostrich-pki
  labels:
    app.kubernetes.io/name: ostrich-pki
    app.kubernetes.io/component: ca
type: kubernetes.io/tls
data:
  # Base64 encoded CA certificate and key
  # Generate with: cat ca.pem | base64 -w0
  tls.crt: ""
  tls.key: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: ostrich-pki-ocsp-certs
  namespace: ostrich-pki
  labels:
    app.kubernetes.io/name: ostrich-pki
    app.kubernetes.io/component: ocsp
type: kubernetes.io/tls
data:
  # OCSP signing certificate and key
  tls.crt: ""
  tls.key: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: ostrich-pki-est-certs
  namespace: ostrich-pki
  labels:
    app.kubernetes.io/name: ostrich-pki
    app.kubernetes.io/component: est
type: kubernetes.io/tls
data:
  # EST TLS certificate and key
  tls.crt: ""
  tls.key: ""
