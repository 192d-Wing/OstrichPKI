# OstrichPKI EST Service
#
# COMPLIANCE MAPPING:
# - RFC 7030: EST Protocol

apiVersion: v1
kind: Service
metadata:
  name: ostrich-pki-est
  namespace: ostrich-pki
  labels:
    app.kubernetes.io/name: ostrich-pki
    app.kubernetes.io/component: est
spec:
  type: ClusterIP
  ports:
    - port: 8443
      targetPort: https
      protocol: TCP
      name: https
  selector:
    app.kubernetes.io/name: ostrich-pki
    app.kubernetes.io/component: est
