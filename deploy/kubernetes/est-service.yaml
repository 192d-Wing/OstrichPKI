# OstrichPKI EST Service (RFC 7030)
#
# Two ports: 8443 plain HTTP for in-cluster consumers (web-ui proxy, Prometheus
# /metrics, k8s probes), and 8444 HTTPS + optional mTLS for external enrollment
# (the Traefik IngressRouteTCP passes raw TLS through to 8444).
#
# COMPLIANCE MAPPING:
# - NIST 800-53: SC-17 (PKI Certificates), SC-8 (TLS for external enrollment)
apiVersion: v1
kind: Service
metadata:
  name: est-service
  namespace: ostrich-pki
  labels:
    app: est-server
spec:
  type: ClusterIP
  selector:
    app: est-server
  ports:
    - { name: http, port: 8443, targetPort: http }
    - { name: https, port: 8444, targetPort: https }
