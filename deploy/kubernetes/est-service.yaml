# OstrichPKI EST Service (RFC 7030)
#
# COMPLIANCE MAPPING:
# - NIST 800-53: SC-17 (PKI Certificates)
apiVersion: v1
kind: Service
metadata:
  name: est-service
  namespace: ostrich-pki
  labels:
    app: est-server
spec:
  type: ClusterIP
  selector:
    app: est-server
  ports:
    - { name: http, port: 8443, targetPort: http }
