# OstrichPKI EST Service (RFC 7030)
#
# The pod terminates TLS (Traefik passes raw TLS through via IngressRouteTCP),
# so this service carries HTTPS on 8443.
#
# COMPLIANCE MAPPING:
# - NIST 800-53: SC-17 (PKI Certificates), SC-8 (TLS in transit)
apiVersion: v1
kind: Service
metadata:
  name: est-service
  namespace: ostrich-pki
  labels:
    app: est-server
spec:
  type: ClusterIP
  selector:
    app: est-server
  ports:
    - { name: https, port: 8443, targetPort: https }
