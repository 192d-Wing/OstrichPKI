# OstrichPKI OCSP Service (RFC 6960)
#
# COMPLIANCE MAPPING:
# - NIST 800-53: SC-17 (PKI Certificates)
apiVersion: v1
kind: Service
metadata:
  name: ocsp-service
  namespace: ostrich-pki
  labels:
    app: ocsp-server
spec:
  type: ClusterIP
  selector:
    app: ocsp-server
  ports:
    - { name: http, port: 8081, targetPort: http }
