# OstrichPKI ACME Service (RFC 8555)
#
# COMPLIANCE MAPPING:
# - NIST 800-53: SC-17 (PKI Certificates)
apiVersion: v1
kind: Service
metadata:
  name: acme-service
  namespace: ostrich-pki
  labels:
    app: acme-server
spec:
  type: ClusterIP
  selector:
    app: acme-server
  ports:
    - { name: http, port: 8080, targetPort: http }
