# OstrichPKI NPE Portal config (ACME production overlay)
#
# COMPLIANCE MAPPING:
# - NIST 800-53: CM-2/CM-6 (baseline + secure configuration settings)
# - NIST 800-53: SC-8/SC-12 (mTLS + ACME-managed server certificate)
#
# Differences vs. the smoke configmap:
#  - secureCookies: true (served over HTTPS)
#  - acme block: the portal enrolls/renews its own server cert (RFC 8555 HTTP-01)
#  - allowedIssuers MUST be set to the real operator issuing-CA subject DN(s)
#    before cutover (placeholder below).
#
# Classification banner: set "classificationBanner" to the operating level; the
# banner color is derived automatically from the text per the DoD/IC standard
# palette (edit it here and re-apply to reconfigure):
#   CUI -> purple   CONFIDENTIAL -> blue   SECRET -> red
#   TOP SECRET -> orange   TOP SECRET//SCI -> yellow   UNCLASSIFIED -> green
# To force a non-standard color, also set "classificationColor" to a CSS color
# (e.g. "#502b85"); it overrides the derived one.
apiVersion: v1
kind: ConfigMap
metadata:
  name: npe-portal-config
  namespace: ostrich-pki
  labels:
    app: npe-portal
data:
  npe-portal.json: |
    {
      "backend": {
        "caUrl": "http://ca-service:8080",
        "estUrl": "http://est-service:8443",
        "ocspUrl": "http://ocsp-service:8081"
      },
      "session": {
        "cookieName": "ostrich_npe_session",
        "inactivityTimeoutSecs": 1800,
        "absoluteTimeoutSecs": 28800,
        "secureCookies": true
      },
      "oidMapping": {
        "sponsorOids": ["2.16.840.1.101.2.1.11.42"],
        "adminOid": "2.16.840.1.101.2.1.11.43",
        "raOids": ["2.16.840.1.101.2.1.11.44"],
        "caaOids": ["2.16.840.1.101.2.1.11.45"],
        "auditorOids": ["2.16.840.1.101.2.1.11.46"],
        "allowedIssuers": ["CN=OstrichPKI NPE Operator CA, O=U.S. Government, OU=NPE, C=US"]
      },
      "classificationBanner": "CUI",
      "cspNonceLength": 16,
      "dodMode": true,
      "certProfiles": [
        { "label": "TLS Client", "value": "tls_client" },
        { "label": "TLS Server", "value": "tls_server", "serverAuth": true },
        { "label": "TLS Server + Client", "value": "tls_server_client", "serverAuth": true },
        { "label": "EFS (File Encryption)", "value": "efs", "efs": true }
      ],
      "ccsaOptions": [
        {
          "label": "Military Services",
          "options": [
            { "label": "Air Force (USAF)", "value": "USAF" },
            { "label": "Army (USA)", "value": "USA" },
            { "label": "Navy (USN)", "value": "USN" },
            { "label": "Marine Corps (USMC)", "value": "USMC" },
            { "label": "Space Force (USSF)", "value": "USSF" },
            { "label": "Coast Guard (USCG)", "value": "USCG" }
          ]
        },
        {
          "label": "Combatant Commands",
          "options": [
            { "label": "AFRICOM", "value": "AFRICOM" },
            { "label": "CENTCOM", "value": "CENTCOM" },
            { "label": "CYBERCOM", "value": "CYBERCOM" },
            { "label": "EUCOM", "value": "EUCOM" },
            { "label": "INDOPACOM", "value": "INDOPACOM" },
            { "label": "NORTHCOM", "value": "NORTHCOM" },
            { "label": "SOCOM", "value": "SOCOM" },
            { "label": "SOUTHCOM", "value": "SOUTHCOM" },
            { "label": "SPACECOM", "value": "SPACECOM" },
            { "label": "STRATCOM", "value": "STRATCOM" },
            { "label": "TRANSCOM", "value": "TRANSCOM" }
          ]
        },
        {
          "label": "Agencies & Field Activities",
          "options": [
            { "label": "DISA", "value": "DISA" },
            { "label": "DLA", "value": "DLA" },
            { "label": "DIA", "value": "DIA" },
            { "label": "NSA", "value": "NSA" },
            { "label": "NGA", "value": "NGA" },
            { "label": "DCSA", "value": "DCSA" },
            { "label": "DCMA", "value": "DCMA" },
            { "label": "DFAS", "value": "DFAS" },
            { "label": "DHA", "value": "DHA" },
            { "label": "DTRA", "value": "DTRA" },
            { "label": "MDA", "value": "MDA" },
            { "label": "OSD / WHS", "value": "OSD" }
          ]
        }
      ],
      "staticFiles": {
        "directory": "/app/static",
        "urlPrefix": "/static"
      },
      "acme": {
        "directoryUrl": "https://acme.oopl.dev.mil/acme/directory",
        "domains": ["npe-portal.oopl.dev.mil"],
        "contact": "mailto:pki@oopl.dev.mil",
        "caBundle": "/app/tls/acme-ca-bundle.pem",
        "challengePort": 8080,
        "renewBeforeDays": 30,
        "cacheDir": "/app/acme-cache"
      }
    }
