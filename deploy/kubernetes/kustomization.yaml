# OstrichPKI Kustomize base
#
# COMPLIANCE MAPPING:
# - NIST 800-53: CM-2 (Baseline Configuration)
# - NIST 800-53: CM-3 (Configuration Change Control)
#
# Generic base matching the running cluster's per-service model
# (ghcr.io/192d-wing/<svc>-service images; ca-server/ca-service naming;
# DATABASE_URL from the ostrich-secrets secret). Environment-specific concerns
# (hostnames, ingress, the .61 anycast VIP, real secret values) belong in
# overlays, not in this base.
#
# Usage:
#   kubectl apply -k deploy/kubernetes/
#
# Pin images per environment via an overlay, e.g.:
#   images:
#     - name: ghcr.io/192d-wing/ca-service
#       newTag: sha-<commit>
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ostrich-pki

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - secrets.yaml
  - ca-deployment.yaml
  - ca-service.yaml
  - acme-deployment.yaml
  - acme-service.yaml
  - est-deployment.yaml
  - est-service.yaml
  - ocsp-deployment.yaml
  - ocsp-service.yaml
  - npe-portal-configmap.yaml
  - npe-portal-deployment.yaml
  - npe-portal-service.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: ostrich-pki
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
