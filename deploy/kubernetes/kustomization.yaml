# OstrichPKI Kustomize base
#
# COMPLIANCE MAPPING:
# - NIST 800-53: CM-2 (Baseline Configuration)
# - NIST 800-53: CM-3 (Configuration Change Control)
#
# Generic base matching the running cluster's per-service model
# (ghcr.io/192d-wing/<svc>-service images; ca-server/ca-service naming;
# DATABASE_URL from the ostrich-secrets secret). Environment-specific concerns
# (hostnames, ingress, the .61 anycast VIP, real secret values) belong in
# overlays, not in this base.
#
# Usage:
#   kubectl apply -k deploy/kubernetes/
#
# Pin images per environment via an overlay, e.g.:
#   images:
#     - name: ghcr.io/192d-wing/ca-service
#       newTag: sha-<commit>
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ostrich-pki

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - secrets.yaml
  - ca-deployment.yaml
  - ca-service.yaml
  - acme-deployment.yaml
  - acme-service.yaml
  - est-deployment.yaml
  - est-service.yaml
  - ocsp-deployment.yaml
  - ocsp-service.yaml
  # NOTE: the NPE portal is intentionally NOT in this base. npe-portal-deployment.yaml
  # is the SMOKE-TEST variant (NPE_ALLOW_INSECURE=true — mTLS client-cert auth and
  # OID->role enforcement DISABLED, plaintext proxy to CA/EST), so including it here
  # meant `kubectl apply -k deploy/kubernetes/` stood up an UNAUTHENTICATED CA/EST
  # proxy by default. Deploy the portal via the `npe-portal-acme/` overlay (real
  # mTLS + ACME-provisioned TLS), or, for a deliberate smoke test only, add the
  # npe-portal-* resources in a dedicated dev overlay. (NIST 800-53: AC-3, CM-6.)

labels:
  - pairs:
      app.kubernetes.io/part-of: ostrich-pki
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
