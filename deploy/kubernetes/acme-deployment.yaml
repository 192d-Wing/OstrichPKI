# OstrichPKI ACME Service Deployment
#
# COMPLIANCE MAPPING:
# - RFC 8555: ACME Protocol
# - NIST 800-53: SC-17 (PKI Certificates)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ostrich-pki-acme
  namespace: ostrich-pki
  labels:
    app.kubernetes.io/name: ostrich-pki
    app.kubernetes.io/component: acme
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ostrich-pki
      app.kubernetes.io/component: acme
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ostrich-pki
        app.kubernetes.io/component: acme
    spec:
      serviceAccountName: ostrich-pki
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: acme
          image: ostrich-pki:latest
          imagePullPolicy: IfNotPresent
          args:
            - --target
            - acme-service
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: ostrich-pki-config
                  key: RUST_LOG
            - name: LOG_JSON
              valueFrom:
                configMapKeyRef:
                  name: ostrich-pki-config
                  key: LOG_JSON
            - name: DATABASE_URL
              value: "postgresql://ostrich:$(DATABASE_PASSWORD)@ostrich-pki-postgresql:5432/ostrich_pki"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ostrich-pki-db
                  key: password
            - name: ACME_BIND_ADDRESS
              value: "0.0.0.0:8080"
            - name: ACME_BASE_URL
              value: "https://acme.example.com"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
