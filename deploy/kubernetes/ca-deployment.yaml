# OstrichPKI CA Service Deployment
#
# COMPLIANCE MAPPING:
# - NIST 800-53: SC-17 (PKI Certificates) — this is the CA core
# - NIST 800-53: SC-12 (Key management) — CA key in HSM/SoftHSM
# - NIST 800-53: CM-2 (Baseline Configuration)
#
# Per-service image published by .github/workflows/docker-publish.yml
# (ghcr.io/192d-wing/ca-service). Deployment/Service names match the running
# cluster (ca-server / ca-service); environment-specific overlays (hostnames,
# ingress, the .61 VIP) live outside this base.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ca-server
  namespace: ostrich-pki
  labels:
    app: ca-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ca-server
  template:
    metadata:
      labels:
        app: ca-server
    spec:
      serviceAccountName: ostrich-pki
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ca-server
          image: ghcr.io/192d-wing/ca-service:latest
          imagePullPolicy: Always
          ports:
            - { name: http, containerPort: 8080 }
            - { name: grpc, containerPort: 50051 }
          env:
            - { name: RUST_LOG, value: "info" }
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ostrich-secrets
                  key: DATABASE_URL
            - { name: CA_REST_ADDRESS, value: "0.0.0.0:8080" }
            - { name: CA_GRPC_ADDRESS, value: "0.0.0.0:50051" }
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
