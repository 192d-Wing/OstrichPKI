# OstrichPKI CA Service — one ClusterIP exposing both the REST API (8080) and
# the gRPC issuance API (50051), matching the running cluster's ca-service.
#
# COMPLIANCE MAPPING:
# - NIST 800-53: SC-17 (PKI Certificates), AC-4 (information flow)
apiVersion: v1
kind: Service
metadata:
  name: ca-service
  namespace: ostrich-pki
  labels:
    app: ca-server
spec:
  type: ClusterIP
  selector:
    app: ca-server
  ports:
    - { name: http, port: 8080, targetPort: http }
    - { name: grpc, port: 50051, targetPort: grpc }
