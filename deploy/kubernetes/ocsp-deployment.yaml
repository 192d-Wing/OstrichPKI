# OstrichPKI OCSP Responder Deployment (RFC 6960)
#
# COMPLIANCE MAPPING:
# - NIST 800-53: SC-17 (PKI Certificates) — revocation status
# - NIST 800-53: CM-2 (Baseline Configuration)
#
# Per-service image (ghcr.io/192d-wing/ocsp-service). Reads revocation status
# from the shared database; waits for the CA to be bootstrapped first.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocsp-server
  namespace: ostrich-pki
  labels:
    app: ocsp-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ocsp-server
  template:
    metadata:
      labels:
        app: ocsp-server
    spec:
      serviceAccountName: ostrich-pki
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-ca
          image: postgres:16-alpine
          command: ["sh", "-c"]
          args:
            - |
              until psql "$DATABASE_URL" -tAc "SELECT 1 FROM ca_certificates WHERE is_root = false LIMIT 1" 2>/dev/null | grep -q 1; do
                echo "waiting for CA bootstrap..."; sleep 3;
              done
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ostrich-secrets
                  key: DATABASE_URL
      containers:
        - name: ocsp-server
          image: ghcr.io/192d-wing/ocsp-service:latest
          imagePullPolicy: Always
          ports:
            - { name: http, containerPort: 8081 }
          env:
            - { name: RUST_LOG, value: "info" }
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ostrich-secrets
                  key: DATABASE_URL
            - { name: OCSP_BIND_ADDRESS, value: "0.0.0.0:8081" }
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
