# OstrichPKI OCSP Responder Deployment
#
# COMPLIANCE MAPPING:
# - RFC 6960: OCSP Protocol
# - NIST 800-53: SC-17 (PKI Certificates)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ostrich-pki-ocsp
  namespace: ostrich-pki
  labels:
    app.kubernetes.io/name: ostrich-pki
    app.kubernetes.io/component: ocsp
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ostrich-pki
      app.kubernetes.io/component: ocsp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ostrich-pki
        app.kubernetes.io/component: ocsp
    spec:
      serviceAccountName: ostrich-pki
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ocsp
          image: ostrich-pki:latest
          imagePullPolicy: IfNotPresent
          args:
            - --target
            - ocsp-service
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: ostrich-pki-config
                  key: RUST_LOG
            - name: LOG_JSON
              valueFrom:
                configMapKeyRef:
                  name: ostrich-pki-config
                  key: LOG_JSON
            - name: DATABASE_URL
              value: "postgresql://ostrich:$(DATABASE_PASSWORD)@ostrich-pki-postgresql:5432/ostrich_pki"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ostrich-pki-db
                  key: password
            - name: OCSP_BIND_ADDRESS
              value: "0.0.0.0:8081"
            - name: OCSP_SIGNING_CERT
              value: "/app/certs/tls.crt"
            - name: OCSP_SIGNING_KEY
              value: "/app/certs/tls.key"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: ocsp-certs
              mountPath: /app/certs
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: ocsp-certs
          secret:
            secretName: ostrich-pki-ocsp-certs
